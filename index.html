<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <script>
      /* theme boot: apply saved choice before first paint — dark is the default */
      (function () {
        var VALID = ['dark', 'light', 'fluent', 'noir', 'harbor', 'hmidnight', 'signal'];
        var t = 'dark';
        try {
          var s = localStorage.getItem('fraytline-theme');
          if (s && VALID.indexOf(s) !== -1) t = s;
        } catch (e) {}
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <title>Fraytline — AI-Native Freight Operating System</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
